name: Semantic Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: semantic-release-${{ github.ref }}
      cancel-in-progress: false
    env:
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run semantic release
        if: ${{ env.RELEASE_PAT != '' }}
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v10.2.0
        with:
          github_token: ${{ env.RELEASE_PAT }}

      - name: Validate semantic release configuration
        if: ${{ env.RELEASE_PAT == '' }}
        run: semantic-release version --print

      - name: Upload distributions to GitHub Release
        if: ${{ env.RELEASE_PAT != '' && steps.semantic-release.outputs.released == 'true' }}
        uses: python-semantic-release/publish-action@v10.5.3
        with:
          github_token: ${{ env.RELEASE_PAT }}
