name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_PROGRESS_BAR: 'off'
  PIP_RETRIES: '10'

jobs:
  lint-test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml

      - name: Install dependencies
        shell: bash
        run: |
          source .github/scripts/pip_retry.sh

          python -m pip install --upgrade pip setuptools wheel
          retry_pip install --index-url https://download.pytorch.org/whl/cpu torch
          retry_pip install "genesis-world @ git+https://github.com/Genesis-Embodied-AI/Genesis.git"
          retry_pip install -e ".[dev]"

      - name: Ruff
        run: poe lint

      - name: API smoke tests
        run: poe test_api

      - name: Tests
        run: poe coverage

      - name: Smoke CLI entry point
        run: poe smoke_cli

      - name: Build docs
        run: poe docs

      - name: Build distributions
        run: poe package

  compatibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml

      - name: Install runtime dependencies
        shell: bash
        run: |
          source .github/scripts/pip_retry.sh

          python -m pip install --upgrade pip setuptools wheel
          retry_pip install --index-url https://download.pytorch.org/whl/cpu torch
          retry_pip install "genesis-world @ git+https://github.com/Genesis-Embodied-AI/Genesis.git"
          retry_pip install -e .

      - name: Import package
        run: python -c "import genesis_sensors; print(genesis_sensors.__version__)"
