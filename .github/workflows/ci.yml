name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_DEFAULT_TIMEOUT: '120'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  PIP_PROGRESS_BAR: 'off'
  PIP_RETRIES: '10'

jobs:
  lint-test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml

      - name: Install dependencies
        shell: bash
        run: |
          retry_pip() {
            local attempt=1
            until python -m pip "$@"; do
              if [ "$attempt" -ge 3 ]; then
                echo "pip $* failed after ${attempt} attempts"
                return 1
              fi
              echo "pip $* failed on attempt ${attempt}; retrying..."
              attempt=$((attempt + 1))
            done
          }

          python -m pip install --upgrade pip setuptools wheel
          retry_pip install --index-url https://download.pytorch.org/whl/cpu torch
          retry_pip install "genesis-world @ git+https://github.com/Genesis-Embodied-AI/Genesis.git"
          retry_pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: pytest tests -q

      - name: Build docs
        run: mkdocs build --strict

      - name: Build distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

  compatibility:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            pyproject.toml
            .github/workflows/ci.yml

      - name: Install runtime dependencies
        shell: bash
        run: |
          retry_pip() {
            local attempt=1
            until python -m pip "$@"; do
              if [ "$attempt" -ge 3 ]; then
                echo "pip $* failed after ${attempt} attempts"
                return 1
              fi
              echo "pip $* failed on attempt ${attempt}; retrying..."
              attempt=$((attempt + 1))
            done
          }

          python -m pip install --upgrade pip setuptools wheel
          retry_pip install --index-url https://download.pytorch.org/whl/cpu torch
          retry_pip install "genesis-world @ git+https://github.com/Genesis-Embodied-AI/Genesis.git"
          retry_pip install -e .

      - name: Import package
        run: python -c "import genesis_sensors; print(genesis_sensors.__version__)"
