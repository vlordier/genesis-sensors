name: Repository Standards

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  branch-name:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate branch name
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          regex='^((feat|fix|docs|refactor|chore|test|ci|build|release)/[a-z0-9._-]+|dependabot/.+)$'
          if [[ ! "$BRANCH_NAME" =~ $regex ]]; then
            echo "Branch name '$BRANCH_NAME' must start with feat/, fix/, docs/, refactor/, chore/, test/, ci/, build/, release/, or dependabot/."
            exit 1
          fi

  pr-title:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          regex='^(feat|fix|docs|refactor|chore|test|ci|build|release)(\([a-z0-9._-]+\))?: .+'
          if [[ ! "$PR_TITLE" =~ $regex ]]; then
            echo "PR title '$PR_TITLE' must follow Conventional Commit style, for example: feat(cli): add demo selector"
            exit 1
          fi
